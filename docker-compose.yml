# Starter şablonu: web (nginx + SPA) + API + MariaDB
# Çalıştırma: docker compose up --build
# Arayüz: http://localhost:8080  |  API doğrudan: http://localhost:8000

services:
  db:
    image: mariadb:11.4
    environment:
      MARIADB_USER: starter
      MARIADB_PASSWORD: starter
      MARIADB_DATABASE: starter
      MARIADB_ROOT_PASSWORD: starter-root
    volumes:
      - starter_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u starter -pstarter --silent"]
      interval: 5s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://starter:starter@db:3306/starter
      # Üretimde mutlaka güçlü bir değer verin: örn. openssl rand -hex 32
      SECRET_KEY: ${SECRET_KEY:-docker-compose-dev-only-replace-in-production-please}
      DEBUG: "false"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      APP_NAME: ${APP_NAME:-Starter API}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Super Admin}
      PUBLIC_REGISTRATION_ENABLED: ${PUBLIC_REGISTRATION_ENABLED:-true}
      DEFAULT_REGISTERED_ROLE_NAME: ${DEFAULT_REGISTERED_ROLE_NAME:-user}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  starter_mariadb_data:
